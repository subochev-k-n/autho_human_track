<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f1a">
    <title>Трекер автогуманиста — Вход</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="apple-touch-icon" href="/static/pwa/icon-192.png">
</head>
<body>
    <div class="auth-page">
        <div class="auth-logo">📊</div>
        <h1>Трекер автогуманиста</h1>
        <p class="subtitle">Ежедневный дневник самооценки</p>
        <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:24px;">
            🔒 Все данные хранятся локально на вашем устройстве
        </p>

        <div class="auth-card card">
            <h2>Вход</h2>
            <div id="login-error" class="alert alert-error hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Ваше имя">
                </div>

                <button type="submit" class="btn btn-primary">Войти</button>
            </form>

            <div class="auth-footer" style="margin-top:20px;">
                Нет профиля? <a href="/register">Создать</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.11.0/dist/sql-wasm.js"></script>
    <script src="/static/js/db.js?v=6"></script>
    <script src="/static/js/api.js?v=6"></script>
    <script src="/static/js/auth.js?v=6"></script>
</body>
</html>
