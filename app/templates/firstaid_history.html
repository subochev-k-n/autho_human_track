<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f1a">
    <title>Трекер автогуманиста — История аптечки</title>
    <link rel="manifest" href="/static/pwa/site.webmanifest">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h1 style="font-size:1.3rem;">📋 История аптечки</h1>
            <a href="/firstaid" class="btn btn-outline btn-small" style="width:auto;">← Назад</a>
        </div>

        <!-- Статистика -->
        <div id="stats-card" class="card hidden">
            <div class="stats-grid" id="stats-grid" style="grid-template-columns:1fr 1fr 1fr;">
                <div class="stat-item"><div class="stat-label">Всего допингов</div><div class="stat-value" id="stat-items">0</div></div>
                <div class="stat-item"><div class="stat-label">Использований</div><div class="stat-value" id="stat-usages">0</div></div>
                <div class="stat-item"><div class="stat-label">Средний эффект</div><div class="stat-value" id="stat-effect">—</div></div>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="card" style="padding:16px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:0.75rem;color:var(--text-muted);display:block;margin-bottom:4px;">От</label>
                    <input type="date" id="filter-from" style="width:100%;padding:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;min-height:44px;">
                </div>
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:0.75rem;color:var(--text-muted);display:block;margin-bottom:4px;">До</label>
                    <input type="date" id="filter-to" style="width:100%;padding:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;min-height:44px;">
                </div>
                <div style="display:flex;align-items:flex-end;gap:4px;">
                    <button class="btn btn-primary btn-small" id="filter-apply" style="min-height:44px;">Применить</button>
                </div>
            </div>
        </div>

        <!-- Таблица истории -->
        <div class="card" style="overflow:hidden;padding:0;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Допинг</th>
                            <th>Категория</th>
                            <th>Оценка</th>
                            <th>Заметка</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr><td colspan="5" class="empty">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://sqlite.org/sqlite-wasm/sqlite-wasm/jswasm/sqlite3.js"></script>
    <script src="/static/js/db.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/firstaid.js"></script>
</body>
</html>
