<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f1a">
    <title>Трекер автогуманиста — Новый профиль</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-logo">📊</div>
        <h1>Трекер автогуманиста</h1>
        <p class="subtitle">Создайте локальный профиль</p>
        <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:24px;">
            🔒 Все данные остаются на этом устройстве
        </p>

        <div class="auth-card card">
            <h2>Новый профиль</h2>
            <div id="register-error" class="alert alert-error hidden"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Придумайте имя" minlength="2">
                </div>

                <button type="submit" class="btn btn-primary">Создать профиль</button>
            </form>

            <div class="auth-footer" style="margin-top:20px;">
                Уже есть профиль? <a href="/login">Войти</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.11.0/dist/sql-wasm.js"></script>
    <script src="/static/js/db.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
