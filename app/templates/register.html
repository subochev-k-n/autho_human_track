<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f1a">
    <title>Трекер автогуманиста — Регистрация</title>
    <link rel="manifest" href="/static/pwa/site.webmanifest">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-logo">📊</div>
        <h1>Трекер автогуманиста</h1>
        <p class="subtitle">Начните отслеживать своё состояние</p>

        <div class="auth-card card">
            <h2>Регистрация</h2>
            <div id="register-error" class="alert alert-error hidden"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Придумайте имя" minlength="2">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="Ваш email">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Минимум 4 символа" minlength="4">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Подтверждение пароля</label>
                    <input type="password" id="confirm-password" name="confirm-password" required autocomplete="new-password" placeholder="Повторите пароль">
                </div>

                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
